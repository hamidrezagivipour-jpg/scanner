<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    padding:20px;

    background:#f5f5f5;

    font-family:tahoma;

    text-align:center;

}

h2{

    margin-bottom:20px;

}

button{

    width:280px;

    height:55px;

    font-size:18px;

    border:none;

    border-radius:10px;

    background:#1976d2;

    color:white;

    margin:8px;

    cursor:pointer;

}

button:hover{

    background:#1565c0;

}

#reader{

    width:320px;

    max-width:100%;

    margin:20px auto;

}

#status{

    margin-top:20px;

    padding:12px;

    background:white;

    border-radius:10px;

    font-size:18px;

    font-weight:bold;

}

.success{

    color:green;

}

.error{

    color:red;

}

.info{

    color:#1976d2;

}

</style>

</head>

<body>

<h2>Scanner V2</h2>

<button id="syncBtn">
🔄 Sync Guests
</button>

<br>

<button id="scanBtn">
📷 Start Scanner
</button>

<div id="reader"></div>

<div id="status" class="info">
Ready
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbx5XHMA1Co2SLX9oGgQTwuaiDzCue8fJsFiQyvJGagdtkk_LzSOHoeNe70ddeF6vBJgfw/exec";

let db;
let scanner = null;

// ---------- IndexedDB ----------

const request = indexedDB.open("GuestDB", 1);

request.onupgradeneeded = function (e) {

    db = e.target.result;

    if (!db.objectStoreNames.contains("guests")) {

        db.createObjectStore("guests", {
            keyPath: "token"
        });

    }

};

request.onsuccess = function (e) {

    db = e.target.result;

    setStatus("Ready");

};

request.onerror = function () {

    alert("Database Error");

};

// ---------- Status ----------

function setStatus(text, cls = "info") {

    const s = document.getElementById("status");

    s.className = cls;

    s.innerHTML = text;

}

// ---------- Sync ----------

document.getElementById("syncBtn").onclick = syncGuests;

async function syncGuests() {

    if (!db) {
        alert("دیتابیس هنوز آماده نشده است.");
        return;
    }

    setStatus("در حال دریافت مهمان‌ها...");

    try {

        const response = await fetch(API + "?page=guests");

        const guests = await response.json();

        const tx = db.transaction("guests", "readwrite");

        const store = tx.objectStore("guests");

        store.clear();

        guests.forEach(function (g) {
            store.put(g);
        });

        tx.oncomplete = function () {

            setStatus("✅ " + guests.length + " مهمان ذخیره شد", "success");

        };

    } catch (err) {

        console.error(err);

        setStatus("❌ خطا در Sync", "error");

    }

}

// ---------- Find Guest ----------

function findGuest(token) {

    return new Promise(function (resolve, reject) {

        const tx = db.transaction("guests", "readonly");

        const store = tx.objectStore("guests");

        const req = store.get(token);

        req.onsuccess = function () {
            resolve(req.result);
        };

        req.onerror = function () {
            reject();
        };

    });

}
