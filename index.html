<!DOCTYPE html>
<html dir="rtl">
  

<head>

<meta charset="UTF-8">

<title>Scanner</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>




<style>

body{

margin:0;
background:#111;
font-family:tahoma;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
padding:20px;
box-sizing:border-box;

}

.card{

width:420px;
max-width:95%;
background:#1d1d1d;
border-radius:18px;
padding:25px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.45);
border:1px solid #333;

}

h1{

margin:0;
font-size:30px;

}

.status{

margin-top:15px;
font-size:22px;
color:#00d26a;

}

#reader{

margin-top:25px;
border-radius:12px;
overflow:hidden;

}

.result{

margin-top:20px;
font-size:26px;
font-weight:bold;

}

.small{

margin-top:8px;
font-size:17px;
opacity:.8;

}

</style>

</head>

<body>

<div class="card">

<h1>QR Scanner</h1>

<div class="status" id="status">

در حال آماده سازی...

</div>

<div id="reader"></div>

<div class="result"
id="result">

</div>

<div class="small"
id="message">

</div>

</div>
<script>

let scanner;

async function startScanner() {

  const status = document.getElementById("status");

  status.innerHTML = "در حال بررسی دسترسی دوربین...";

  if (!navigator.mediaDevices) {
    status.innerHTML = "مرورگر از دوربین پشتیبانی نمی‌کند.";
    return;
  }

  try {

    await navigator.mediaDevices.getUserMedia({
      video: true
    });

    status.innerHTML = "Permission Granted";

    scanner = new Html5Qrcode("reader");

    await scanner.start(
      {
        facingMode: "environment"
      },
      {
        fps: 10,
        qrbox: 260
      },
      onScanSuccess
    );

    status.innerHTML = "دوربین آماده اسکن است.";

  } catch(err) {

    console.error(err);
status.innerHTML = "خطا: " + err.message;

  }

}

function onScanSuccess(decodedText){

  document.getElementById("result").innerHTML = "⏳ در حال بررسی...";
  document.getElementById("message").innerHTML = "";

  scanner.pause();

  fetch("https://script.google.com/macros/s/AKfycbzhbdXVTyr0ON_x2V9baeeUBSaiYHFrz_7I2_Xd5hcpKl0FXphScXg94ZF5VdWJ7osXIw/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      qr: decodedText,
      scanner: scannerToken
    })
  })
  .then(response => response.json())
  .then(showResult)
  .catch(function(error){

    document.getElementById("result").innerHTML = "❌";

    document.getElementById("message").innerHTML = error.toString();

    console.log(error);

    scanner.resume();

});

}

function showResult(data){

document.getElementById("result").innerHTML=data.title;

document.getElementById("message").innerHTML=data.message;

if (navigator.vibrate) {

  if (data.ok) {
    navigator.vibrate([120]);
  } else {
    navigator.vibrate([300]);
  }

}

setTimeout(function(){

document.getElementById("result").innerHTML="";

document.getElementById("message").innerHTML="";

scanner.resume();

},2000);

}
const params = new URLSearchParams(window.location.search);
const scannerToken = params.get("scanner");

window.onload = function () {
    startScanner();
};

</script>

</body>

</html>
